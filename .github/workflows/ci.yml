name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MoonBit (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$HOME/.moon/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Show MoonBit version
        shell: bash
        run: moon version

      - name: Check
        id: check
        shell: bash
        run: moon check --target native | tee check.log

      - name: Test
        id: test
        shell: bash
        run: moon test --target native | tee test.log

      - name: Publish test summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Test Summary (${{ matrix.os }})"
            echo
            echo "- Check: ${{ steps.check.outcome }}"
            echo "- Test: ${{ steps.test.outcome }}"
            echo
            echo '```text'
            tail -n 20 test.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            check.log
            test.log

  verify:
    name: Verify Generated Files
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MoonBit
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit version
        shell: bash
        run: moon version

      - name: Check formatting
        shell: bash
        run: moon fmt --check

      - name: Refresh interface files
        shell: bash
        run: moon info --target native

      - name: Verify generated files are committed
        shell: bash
        run: git diff --exit-code

      - name: Coverage summary
        shell: bash
        run: moon coverage analyze -p justjavac/clipboard -- -f summary | tee coverage-summary.txt

      - name: Coverage XML
        shell: bash
        run: moon coverage analyze -p justjavac/clipboard -- -f cobertura -o coverage.xml

      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: true
          verbose: true
