name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            codecov_flag: linux
          - os: macos-latest
            codecov_flag: macos
          - os: windows-latest
            codecov_flag: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MoonBit (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$HOME/.moon/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Test
        shell: bash
        run: moon test --target native --enable-coverage

      - name: Check examples module
        shell: bash
        run: moon check --manifest-path examples/moon.mod.json --target native

      - name: Coverage XML
        shell: bash
        run: moon coverage analyze -p justjavac/clipboard -- -f cobertura -o coverage.xml

      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@v5
        with:
          disable_search: true
          fail_ci_if_error: true
          files: coverage.xml
          flags: ${{ matrix.codecov_flag }}
          name: ${{ matrix.codecov_flag }}
          verbose: true

  verify:
    name: Verify Generated Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MoonBit
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Verify formatting and generated files
        shell: bash
        run: |
          moon fmt --check
          moon info --target native
          moon check --manifest-path examples/moon.mod.json --target native
          git diff --exit-code
