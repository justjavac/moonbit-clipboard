name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MoonBit (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$HOME/.moon/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Show MoonBit version
        shell: bash
        run: moon version

      - name: Check
        id: check
        shell: bash
        run: moon check --target native | tee check.log

      - name: Test
        id: test
        shell: bash
        run: moon test --target native | tee test.log

      - name: Publish test summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Test Summary (${{ matrix.os }})"
            echo
            echo "- Check: ${{ steps.check.outcome }}"
            echo "- Test: ${{ steps.test.outcome }}"
            echo
            echo '```text'
            tail -n 20 test.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            check.log
            test.log

  verify:
    name: Verify Generated Files
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MoonBit
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit version
        shell: bash
        run: moon version

      - name: Check formatting
        shell: bash
        run: moon fmt --check

      - name: Refresh interface files
        shell: bash
        run: moon info --target native

      - name: Verify generated files are committed
        shell: bash
        run: git diff --exit-code

      - name: Coverage summary
        shell: bash
        run: moon coverage analyze -p justjavac/clipboard -- -f summary | tee coverage-summary.txt

      - name: Coverage XML
        shell: bash
        run: moon coverage analyze -p justjavac/clipboard -- -f cobertura -o coverage.xml

      - name: Coverage HTML
        shell: bash
        run: moon coverage analyze -p justjavac/clipboard -- -f html -o coverage-html

      - name: Prepare coverage badge data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: coverage_badge
        shell: bash
        run: |
          set -euo pipefail

          total_line="$(grep -m1 '^Total:' coverage-summary.txt || true)"
          if [ -z "$total_line" ]; then
            echo "Could not find a Total line in coverage-summary.txt" >&2
            exit 1
          fi

          covered="$(echo "$total_line" | sed -E 's/^Total:[[:space:]]*([0-9]+)\/([0-9]+).*$/\1/')"
          total="$(echo "$total_line" | sed -E 's/^Total:[[:space:]]*([0-9]+)\/([0-9]+).*$/\2/')"

          if [ "$total" = "0" ]; then
            percentage="0.0"
          else
            percentage="$(awk -v covered="$covered" -v total="$total" 'BEGIN { printf "%.1f", (covered / total) * 100 }')"
          fi

          if awk "BEGIN { exit !($percentage >= 90) }"; then
            color="brightgreen"
          elif awk "BEGIN { exit !($percentage >= 80) }"; then
            color="green"
          elif awk "BEGIN { exit !($percentage >= 70) }"; then
            color="yellowgreen"
          elif awk "BEGIN { exit !($percentage >= 60) }"; then
            color="yellow"
          elif awk "BEGIN { exit !($percentage >= 50) }"; then
            color="orange"
          else
            color="red"
          fi

          mkdir -p badge-out/badges
          cat > badge-out/badges/coverage.json <<EOF
          {"schemaVersion":1,"label":"coverage","message":"${percentage}%","color":"${color}"}
          EOF
          touch badge-out/.nojekyll

          echo "percentage=${percentage}" >> "$GITHUB_OUTPUT"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage-summary.txt
            coverage.xml
            coverage-html

      - name: Publish coverage badge data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          BADGE_BRANCH: badge-data
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf badge-branch
          git fetch origin "${BADGE_BRANCH}" || true

          if git ls-remote --exit-code --heads origin "${BADGE_BRANCH}" >/dev/null 2>&1; then
            git worktree add badge-branch "origin/${BADGE_BRANCH}"
            cd badge-branch
            git switch "${BADGE_BRANCH}"
          else
            git worktree add --detach badge-branch
            cd badge-branch
            git switch --orphan "${BADGE_BRANCH}"
          fi

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R ../badge-out/. .

          git add badges/coverage.json .nojekyll
          if git diff --cached --quiet; then
            echo "Coverage badge data is unchanged."
            exit 0
          fi

          git commit -m "Update coverage badge"
          git push origin "${BADGE_BRANCH}"

      - name: Publish coverage summary
        if: always()
        env:
          BADGE_PERCENTAGE: ${{ steps.coverage_badge.outputs.percentage }}
        shell: bash
        run: |
          {
            echo "## Coverage Summary"
            echo
            if [ -n "$BADGE_PERCENTAGE" ]; then
              echo "- Badge coverage: ${BADGE_PERCENTAGE}%"
              echo
            fi
            echo '```text'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
